name: Sync Gerrit → GitHub

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.GERRIT_SSH_KEY }}

      - name: Add Gerrit + GitHub host keys
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -T 10 -p 29418 gerrit.lilingkun.com >> ~/.ssh/known_hosts 2>/dev/null || \
            echo "::warning::gerrit.lilingkun.com host key scan failed, will rely on StrictHostKeyChecking=accept-new"
          ssh-keyscan -T 10 github.com >> ~/.ssh/known_hosts 2>/dev/null || \
            echo "::warning::github.com host key scan failed, will rely on StrictHostKeyChecking=accept-new"

      - name: Switch origin to SSH
        run: |
          git remote set-url origin git@github.com:AuraK-7/lw0106.git

      - name: Fetch from Gerrit
        env:
          GIT_SSH_COMMAND: ssh -o StrictHostKeyChecking=accept-new
        run: |
          git remote add gerrit ssh://23301132@gerrit.lilingkun.com:29418/LW-01-06 2>/dev/null || true
          git fetch gerrit master

      - name: Push to GitHub (if new commits)
        run: |
          GERIT_SHA=$(git rev-parse gerrit/master)
          GITHUB_SHA=$(git rev-parse HEAD)
          echo "Gerrit: $GERIT_SHA"
          echo "GitHub: $GITHUB_SHA"
          if [ "$GERIT_SHA" != "$GITHUB_SHA" ]; then
            echo "New commits detected, syncing..."
            git checkout main
            git reset --hard gerrit/master
            git push origin main --force
            echo "Synced $GERIT_SHA to main"
          else
            echo "Already in sync"
          fi
